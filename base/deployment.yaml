apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw-gateway
spec:
  replicas: 1
  strategy:
    type: Recreate
  template:
    spec:
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      initContainers:
      - name: init-config
        image: ghcr.io/openclaw/openclaw:main-slim
        env:
          - name: CONFIG_MODE
            value: "merge"
        command:
          - sh
          - -c
          - |

            log() { echo "[$(date -Iseconds)] [init-config] $*"; }

            log "Starting config initialization"
            mkdir -p /home/node/.openclaw
            CONFIG_MODE="${CONFIG_MODE:-merge}"

            if [ "$CONFIG_MODE" = "merge" ] && [ -f /home/node/.openclaw/openclaw.json ]; then
              log "Mode: merge - merging default config with existing config"
              if node -e "
                const fs = require('fs');
                // Strip JSON5 single-line comments while preserving // inside strings (e.g. URLs)
                const stripComments = (s) => {
                  let r = '', q = false, i = 0;
                  while (i < s.length) {
                    if (q) {
                      if (s[i] === '\\\\') { r += s[i] + s[i+1]; i += 2; continue; }
                      if (s[i] === '\"') q = false;
                      r += s[i++];
                    } else if (s[i] === '\"') {
                      q = true; r += s[i++];
                    } else if (s[i] === '/' && s[i+1] === '/') {
                      while (i < s.length && s[i] !== '\n') i++;
                    } else { r += s[i++]; }
                  }
                  return r;
                };
                let existing;
                try {
                  existing = JSON.parse(stripComments(fs.readFileSync('/home/node/.openclaw/openclaw.json', 'utf8')));
                } catch (e) {
                  console.error('[init-config] Warning: existing config is not valid JSON, will overwrite');
                  process.exit(1);
                }
                const defaultConfig = JSON.parse(stripComments(fs.readFileSync('/config/openclaw.json', 'utf8')));
                const deepMerge = (target, source) => {
                  for (const key of Object.keys(source)) {
                    // 数组整体替换、对象执行合并
                    if (source[key] && typeof source[key] === 'object' && !Array.isArray(source[key])) {
                      target[key] = target[key] || {};
                      deepMerge(target[key], source[key]);
                    } else {
                      target[key] = source[key];
                    }
                  }
                  return target;
                };
                const merged = deepMerge(defaultConfig, existing);
                fs.writeFileSync('/home/node/.openclaw/openclaw.json', JSON.stringify(merged, null, 2));
              "; then
                log "Config merged successfully"
              else
                log "WARNING: Merge failed (existing config may not be valid JSON), falling back to overwrite"
                cp /config/openclaw.json /home/node/.openclaw/openclaw.json
              fi
            else
              if [ ! -f /home/node/.openclaw/openclaw.json ]; then
                log "Fresh install - writing initial config"
              else
                log "Mode: overwrite - replacing config with default values"
              fi
              cp /config/openclaw.json /home/node/.openclaw/openclaw.json
            fi
            log "Config initialization complete"
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
          runAsUser: 1000
          runAsGroup: 1000
        volumeMounts:
          - name: home
            mountPath: /home/node/.openclaw
          - name: openclaw-config
            mountPath: /config
      - name: init-skills
        command:
        - sh
        - -c
        - |
          log() { echo "[$(date -Iseconds)] [init-skills] $*"; }

          log "Starting skills initialization"

          # ============================================================
          # Runtime Dependencies
          # ============================================================
          # Some skills require additional runtimes (Python, Go, etc.)
          # Install them here so they persist across pod restarts.
          #
          # Example: Install uv (Python package manager) for Python skills
          mkdir -p /home/node/.openclaw/bin
          if [ ! -f /home/node/.openclaw/bin/uv ]; then
            log "Installing uv..."
            curl -LsSf https://astral.sh/uv/install.sh | env UV_INSTALL_DIR=/home/node/.openclaw/bin sh
          fi
          #
          # Example: Install pnpm and packages for interfaces (e.g., MS Teams)
          # The read-only filesystem and non-root UID prevent writing to default
          # pnpm paths (/usr/local/lib/node_modules, ~/.local/share/pnpm, etc.).
          # Redirect PNPM_HOME to the PVC so the binary persists across restarts.
          # The init container's HOME=/tmp ensures pnpm's cache, state, and config
          # writes land on /tmp (writable emptyDir). The store goes on the PVC so
          # hardlinks work (same filesystem as node_modules) and persist.
          PNPM_HOME=/home/node/.openclaw/pnpm
          mkdir -p "$PNPM_HOME"
          if [ ! -f "$PNPM_HOME/pnpm" ]; then
            log "Installing pnpm..."
            curl -fsSL https://get.pnpm.io/install.sh | env PNPM_HOME="$PNPM_HOME" SHELL=/bin/sh sh -
          fi
          export PATH="$PNPM_HOME:$PATH"
          log "Installing interface dependencies..."
          cd /home/node/.openclaw
          pnpm install nanoid --store-dir /home/node/.openclaw/.pnpm-store

          # ============================================================
          # Skill Installation
          # ============================================================
          # Install skills from ClawHub (https://clawhub.com)
          # Add skill slugs to the list below to install them declaratively.
          mkdir -p /home/node/.openclaw/workspace/skills
          cd /home/node/.openclaw/workspace
          install_skill() {
            skill="$1"
            SKILL_NAME="$(basename "$skill")"
            if [ -z "$skill" ]; then
              return 0
            fi
            if [ -d "skills/$SKILL_NAME" ]; then
              log "Skill already installed: $skill"
              return 0
            fi
            log "Installing skill: $skill"
            attempts=6
            delay=5
            for i in $(seq 1 "$attempts"); do
              if npx -y clawhub install "$skill" --no-input; then
                log "Installed skill: $skill"
                return 0
              fi
              # Add a little jitter so concurrent pods don't retry in lockstep.
              jitter=$((RANDOM % 5))
              if [ "$i" -lt "$attempts" ]; then
                log "WARNING: Failed to install skill: $skill (attempt $i/$attempts). Retrying in $((delay + jitter))s..."
                sleep $((delay + jitter))
                delay=$((delay * 2))
              fi
            done
            log "WARNING: Failed to install skill after $attempts attempts: $skill"
            return 1
          }
          for skill in weather gog github; do
            install_skill "$skill" || true
          done
          log "Skills initialization complete"
        env:
        - name: HOME
          value: /home/node/.openclaw
        - name: NPM_CONFIG_CACHE
          value: /home/node/.openclaw/.npm
        image: ghcr.io/openclaw/openclaw:main-slim
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
          runAsGroup: 1000
          runAsNonRoot: true
          runAsUser: 1000
        volumeMounts:
          - name: tmp
            mountPath: /tmp
          - name: home
            mountPath: /home/node/.openclaw
      - name: init-setup
        image: ghcr.io/openclaw/openclaw:main-slim
        command:
          - node
          - dist/index.js
          - setup
        env:
          - name: HOME
            value: /home/node/.openclaw
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
          runAsNonRoot: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
        volumeMounts:
          - name: home
            mountPath: /home/node/.openclaw
          - name: tmp
            mountPath: /tmp
      containers:
      - name: gateway
        image: ghcr.io/openclaw/openclaw:main-slim
        args:
          - gateway
          - --bind
          - lan
          - --port
          - "18789"
        command:
          - node
          - dist/index.js
        ports:
        - containerPort: 18789
        envFrom:
        - secretRef:
            name: openclaw-env-secret
        volumeMounts:
          - name: home
            mountPath: /home/node/.openclaw
          - name: tmp
            mountPath: /tmp
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "2"
            memory: "2Gi"
        livenessProbe:
          exec:
            command:
              - node
              - -e
              - "require('http').get('http://127.0.0.1:18789/readyz', r => process.exit(r.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))"
          failureThreshold: 3
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 5
        readinessProbe:
          exec:
            command:
              - node
              - -e
              - "require('http').get('http://127.0.0.1:18789/readyz', r => process.exit(r.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))"
          failureThreshold: 3
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
      - name: chromium
        env:
        - name: XDG_CACHE_HOME
          value: /tmp
        image: chromedp/headless-shell:146.0.7680.72
        livenessProbe:
          failureThreshold: 6
          httpGet:
            path: /json/version
            port: 9222
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /json/version
            port: 9222
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: 2000m
            memory: 2Gi
          requests:
            cpu: 200m
            memory: 512Mi
        securityContext:
          runAsGroup: 1000
          runAsUser: 1000
        startupProbe:
          failureThreshold: 12
          httpGet:
            path: /json/version
            port: 9222
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 5
        volumeMounts:
          - name: tmp
            mountPath: /tmp
      volumes:
      - name: home
        persistentVolumeClaim:
          claimName: openclaw-data
      - name: openclaw-config
        configMap:
          name: openclaw-json-config
      - emptyDir: {}
        name: tmp
