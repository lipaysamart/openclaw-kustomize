apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - deployment.yaml
  - service.yaml
  - pvc.yaml

labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/name: openclaw
      app.kubernetes.io/part-of: openclaw-kustomize

generatorOptions:
  disableNameSuffixHash: true
  labels:
    app.kubernetes.io/managed-by: kustomize

secretGenerator:
  - name: openclaw-env-secret
    literals:
      - BAILIAN_API_KEY=sk-xx
      - OPENCLAW_GATEWAY_TOKEN=5mp2ULNymojBKFvrWsswgNecvou5p8f9
        # - OPENCLAW_GATEWAY_PASSWORD=

configMapGenerator:
  - name: openclaw-json-config
    files:
      - openclaw.json
