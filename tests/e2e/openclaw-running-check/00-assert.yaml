---
apiVersion: v1
kind: Pod
metadata:
  # 注意：由于 Pod 名称通常带随机后缀，我们可以通过标签匹配
  labels:
    app.kubernetes.io/name: openclaw
status:
  phase: Running
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/name: openclaw
status:
  readyReplicas: 1
---
apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 300
collectors:
- type: pod
  selector: app.kubernetes.io/name=openclaw
  namespace: default
  tail: 10
